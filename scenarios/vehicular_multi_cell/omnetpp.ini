[General]
network = scenarios.vehicular_multi_cell.UrbanGrid5G
sim-time-limit = 95s
seed-set = 20260402
num-rngs = 2
cmdenv-autoflush = true
debug-on-errors = false
print-undisposed = false
**.routingRecorder.enabled = false
**.sctp.**.scalar-recording = false
**.sctp.**.vector-recording = false
**.vector-recording = true
**.tcp.typename = "Tcp"
**.tcp.advertisedWindow = 65535
**.tcp.tcpAlgorithmClass = "TcpReno"
**.tcp.sackSupport = true
**.tcp.nagleEnabled = false
**.tcp.mss = 1452

output-scalar-file = ../../results/raw/vehicular_multi_cell/${configname}.sca
output-vector-file = ../../results/raw/vehicular_multi_cell/${configname}.vec

##########################################################
# Topology, SUMO, and mobility
##########################################################
*.playgroundSizeX = 450m
*.playgroundSizeY = 450m
*.playgroundSizeZ = 50m
*.configurator.config = xmldoc("demo.xml")

*.veinsManager.host = "127.0.0.1"
*.veinsManager.port = 9999
*.veinsManager.autoShutdown = true
*.veinsManager.moduleType = "simu5g.nodes.cars.NRCar"
*.veinsManager.moduleName = "car"
*.veinsManager.updateInterval = 0.1s

*.car[*].mobility.typename = "VeinsInetMobility"

##########################################################
# MEC defaults
##########################################################
*.ualcmp.gateway = "router"
*.mecHost.gateway = "iUpf"
*.mecHost.virtualisationInfrastructure.ipv4.forwarding = true
*.mecHost.virtualisationInfrastructure.numIndependentMecApp = parent.numIndependentMecApp
*.mecHost.numIndependentMecApp = 0
*.mecHost.maxMECApps = 0
*.mecHost.maxRam = 32GB
*.mecHost.maxDisk = 100TB
*.mecHost.maxCpuSpeed = 300000
*.mecHost.bsList = []
*.mecHost.mecPlatform.numMecServices = 0
*.mecHost.mecPlatformManager.mecOrchestrator = "mecOrchestrator"
*.mecHost.mecPlatform.serviceRegistry.localAddress = "mecHost.virtualisationInfrastructure"
*.mecHost.mecPlatform.serviceRegistry.localPort = 10021
*.mecHost.mecPlatform.serviceRegistry.rng-0 = 0
*.mecHost.mecPlatform.serviceRegistry.rng-1 = 1
*.mecOrchestrator.mecHostList = []
*.mecOrchestrator.mecApplicationPackageList = []
**.hasRNISupport = false

##########################################################
# NR radio configuration
##########################################################
*.carrierAggregation.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].numerologyIndex = 0
*.carrierAggregation.componentCarrier[0].carrierFrequency = 3.5GHz
*.carrierAggregation.componentCarrier[0].numBands = 50

*.gNodeB*.cellularNic.numCarriers = 1
*.gNodeB*.cellularNic.channelModel[0].componentCarrierModule = "carrierAggregation.componentCarrier[0]"

*.car[*].cellularNic.numCarriers = 1
*.car[*].cellularNic.nrChannelModel[0].componentCarrierModule = "carrierAggregation.componentCarrier[0]"

**.ueTxPower = 26dBm
**.eNodeBTxPower = 43dBm
**.targetBler = 0.01
**.blerShift = 5
**.downlink_interference = true
**.uplink_interference = true

*.car[*].masterId = 0
*.car[*].macCellId = 0
*.car[*].nrMasterId = 1
*.car[*].nrMacCellId = 1
*.car[*].cellularNic.nrPhy.dynamicCellAssociation = true
*.car[*].cellularNic.nrPhy.enableHandover = true

*.gNodeB1.macCellId = 1
*.gNodeB1.macNodeId = 1
*.gNodeB2.macCellId = 2
*.gNodeB2.macNodeId = 2
*.gNodeB*.cellularNic.phy.enableHandover = true
*.gNodeB*.cellularNic.phy.handoverLatency = 50ms
*.gNodeB*.cellInfo.broadcastMessageInterval = 0.5s
*.gNodeB*.mecHost = ""

##########################################################
# X2
##########################################################
*.gNodeB*.numX2Apps = 1
*.gNodeB*.x2App[*].server.localPort = 5000 + ancestorIndex(1)
*.gNodeB1.x2App[0].client.connectAddress = "gNodeB2%x2ppp0"
*.gNodeB2.x2App[0].client.connectAddress = "gNodeB1%x2ppp0"
**.sctp.nagleEnabled = false
**.sctp.enableHeartbeats = false

##########################################################
# Default placement
##########################################################
*.gNodeB1.mobility.initialX = 110m
*.gNodeB1.mobility.initialY = 200m
*.gNodeB2.mobility.initialX = 330m
*.gNodeB2.mobility.initialY = 200m

##########################################################
# Default application sizing
##########################################################
*.edgeServer.numApps = 0
*.cloudServer.numApps = 0
*.videoServer.numApps = 0

##########################################################
# VehicularSingleCellSafety
##########################################################
[Config VehicularSingleCellSafety]
description = "Single-cell vehicular baseline with periodic safety uplink only"
*.veinsManager.launchConfig = xmldoc("urban_light.launchd.xml")
*.gNodeB2.mobility.initialX = 1200m
*.gNodeB2.mobility.initialY = 1200m
*.car[*].cellularNic.nrPhy.enableHandover = false
*.gNodeB*.cellularNic.phy.enableHandover = false

*.edgeServer.numApps = ${safetyMaxVehicles=16}
*.edgeServer.app[*].typename = "CbrReceiver"
*.edgeServer.app[*].localPort = 3000 + ancestorIndex(0)

*.car[*].numApps = 1
*.car[*].app[0].typename = "CbrSender"
*.car[*].app[0].destAddress = "edgeServer"
*.car[*].app[0].destPort = 3000 + ancestorIndex(1)
*.car[*].app[0].localPort = 7000 + ancestorIndex(1)
*.car[*].app[0].packetSize = 200B
*.car[*].app[0].sampling_time = 0.1s
*.car[*].app[0].startTime = 1s + ancestorIndex(1) * 0.05s
*.car[*].app[0].finishTime = 90s

##########################################################
# VehicularSingleCellMixed
##########################################################
[Config VehicularSingleCellMixed]
description = "Single-cell vehicular baseline with safety, telemetry, and burst downlink"
*.veinsManager.launchConfig = xmldoc("urban_light.launchd.xml")
*.gNodeB2.mobility.initialX = 1200m
*.gNodeB2.mobility.initialY = 1200m
*.car[*].cellularNic.nrPhy.enableHandover = false
*.gNodeB*.cellularNic.phy.enableHandover = false

*.edgeServer.numApps = ${mixedMaxVehicles=16}
*.edgeServer.app[*].typename = "CbrReceiver"
*.edgeServer.app[*].localPort = 3000 + ancestorIndex(0)

*.cloudServer.numApps = ${mixedMaxVehicles}
*.cloudServer.app[*].typename = "CbrReceiver"
*.cloudServer.app[*].localPort = 4000 + ancestorIndex(0)

*.videoServer.numApps = ${mixedMaxVehicles}
*.videoServer.app[*].typename = "BurstSender"
*.videoServer.app[*].localPort = 5000 + ancestorIndex(0)
*.videoServer.app[*].destAddress = "car[" + string(ancestorIndex(0)) + "]"
*.videoServer.app[*].destPort = 5000
*.videoServer.app[*].startTime = 3s + ancestorIndex(0) * 0.05s
*.videoServer.app[*].burstSize = 8
*.videoServer.app[*].interBurstTime = 6s
*.videoServer.app[*].packetSize = 1200B
*.videoServer.app[*].intraBurstTime = 0.02s

*.car[*].numApps = 3

*.car[*].app[0].typename = "CbrSender"
*.car[*].app[0].destAddress = "edgeServer"
*.car[*].app[0].destPort = 3000 + ancestorIndex(1)
*.car[*].app[0].localPort = 7000 + ancestorIndex(1)
*.car[*].app[0].packetSize = 200B
*.car[*].app[0].sampling_time = 0.1s
*.car[*].app[0].startTime = 1s + ancestorIndex(1) * 0.05s
*.car[*].app[0].finishTime = 90s

*.car[*].app[1].typename = "CbrSender"
*.car[*].app[1].destAddress = "cloudServer"
*.car[*].app[1].destPort = 4000 + ancestorIndex(1)
*.car[*].app[1].localPort = 8000 + ancestorIndex(1)
*.car[*].app[1].packetSize = 1000B
*.car[*].app[1].sampling_time = 0.05s
*.car[*].app[1].startTime = 2s + ancestorIndex(1) * 0.05s
*.car[*].app[1].finishTime = 90s

*.car[*].app[2].typename = "BurstReceiver"
*.car[*].app[2].localPort = 5000

##########################################################
# VehicularMultiCellMixed
##########################################################
[Config VehicularMultiCellMixed]
extends = VehicularSingleCellMixed
description = "Two-cell vehicular baseline with dynamic association and handover"
*.veinsManager.launchConfig = xmldoc("urban_light.launchd.xml")
*.gNodeB1.mobility.initialX = 110m
*.gNodeB1.mobility.initialY = 200m
*.gNodeB2.mobility.initialX = 330m
*.gNodeB2.mobility.initialY = 200m
*.car[*].cellularNic.nrPhy.enableHandover = true
*.gNodeB*.cellularNic.phy.enableHandover = true

##########################################################
# VehicularMultiCellDense
##########################################################
[Config VehicularMultiCellDense]
extends = VehicularMultiCellMixed
description = "Denser traffic and higher offered load for multi-cell experiments"
*.veinsManager.launchConfig = xmldoc("urban_dense.launchd.xml")

*.edgeServer.numApps = ${denseMaxVehicles=32}
*.cloudServer.numApps = ${denseMaxVehicles}
*.videoServer.numApps = ${denseMaxVehicles}

*.videoServer.app[*].burstSize = 12
*.videoServer.app[*].interBurstTime = 4s
*.videoServer.app[*].packetSize = 1400B
*.videoServer.app[*].intraBurstTime = 0.01s

*.car[*].app[0].packetSize = 220B
*.car[*].app[0].sampling_time = 0.08s
*.car[*].app[1].packetSize = 1200B
*.car[*].app[1].sampling_time = 0.03s

##########################################################
# VehicularMultiCellMec
##########################################################
[Config VehicularMultiCellMec]
network = scenarios.vehicular_multi_cell.UrbanGrid5GMec
description = "Two-cell vehicular scenario with MEC host, orchestrator, and request-response service"
*.veinsManager.launchConfig = xmldoc("urban_light.launchd.xml")
num-rngs = 3
*.gNodeB1.mobility.initialX = 110m
*.gNodeB1.mobility.initialY = 200m
*.gNodeB2.mobility.initialX = 330m
*.gNodeB2.mobility.initialY = 200m
*.car[*].cellularNic.nrPhy.enableHandover = true
*.gNodeB*.cellularNic.phy.enableHandover = true
*.ualcmp.gateway = "upf"
*.mecHost.gateway = "upf"

*.mecHost.maxMECApps = ${mecMaxVehicles=16}
*.mecHost.maxCpuSpeed = 380000
*.mecHost.bsList = ["gNodeB1", "gNodeB2"]
*.mecHost.mecPlatform.numMecServices = 2
*.mecHost.mecPlatform.mecService[0].typename = "RNIService"
*.mecHost.mecPlatform.mecService[0].localAddress = "mecHost.virtualisationInfrastructure"
*.mecHost.mecPlatform.mecService[0].localPort = 10020
*.mecHost.mecPlatform.mecService[0].rng-0 = 0
*.mecHost.mecPlatform.mecService[0].rng-1 = 1
*.mecHost.mecPlatform.mecService[0].requestServiceTime = 200us
*.mecHost.mecPlatform.mecService[1].typename = "LocationService"
*.mecHost.mecPlatform.mecService[1].localAddress = "mecHost.virtualisationInfrastructure"
*.mecHost.mecPlatform.mecService[1].localPort = 10022
*.mecHost.mecPlatform.mecService[1].rng-0 = 0
*.mecHost.mecPlatform.mecService[1].rng-1 = 1
*.mecHost.mecPlatform.mecService[1].requestServiceTime = 250us
*.mecHost.mecPlatform.mecService[1].subscriptionServiceTime = 20us
*.mecOrchestrator.selectionPolicy = "AvailableResourcesBased"
*.mecOrchestrator.mecHostList = ["mecHost"]
*.mecOrchestrator.mecApplicationPackageList = ["ResponseApp"]
*.gNodeB*.mecHost = "mecHost"
**.hasRNISupport = true

*.car[*].numApps = 2
*.car[*].app[0].typename = "DeviceApp"
*.car[*].app[0].localPort = 4500
*.car[*].app[0].UALCMPAddress = "ualcmp"
*.car[*].app[0].UALCMPPort = 1000
*.car[*].app[0].appPackageSource = "ApplicationDescriptors/ResponseApp.json"

*.car[*].app[1].typename = "UERequestApp"
*.car[*].app[1].localPort = 4600
*.car[*].app[1].deviceAppAddress = "car[" + string(ancestorIndex(1)) + "]"
*.car[*].app[1].deviceAppPort = 4500
*.car[*].app[1].mecAppName = "MECResponseApp"
*.car[*].app[1].requestPacketSize = 64B
*.car[*].app[1].period = 0.5s
*.car[*].app[1].startTime = 4s + ancestorIndex(1) * 0.05s
*.car[*].app[1].stopTime = 70s

##########################################################
# VehicularMultiCellMecStress
##########################################################
[Config VehicularMultiCellMecStress]
extends = VehicularMultiCellMec
description = "MEC scenario with denser traffic and MEC background load"
*.veinsManager.launchConfig = xmldoc("urban_dense.launchd.xml")

*.mecHost.maxCpuSpeed = 420000
*.mecHost.numIndependentMecApp = 4
*.mecHost.independentMecApp[0].typename = "MecRequestForegroundApp"
*.mecHost.independentMecApp[0].mp1Address = "mecHost.virtualisationInfrastructure"
*.mecHost.independentMecApp[0].mp1Port = 10021
*.mecHost.independentMecApp[0].lambda = 40ms
*.mecHost.independentMecApp[1].typename = "MecRequestForegroundApp"
*.mecHost.independentMecApp[1].mp1Address = "mecHost.virtualisationInfrastructure"
*.mecHost.independentMecApp[1].mp1Port = 10021
*.mecHost.independentMecApp[1].lambda = 40ms
*.mecHost.independentMecApp[2].typename = "MecRequestBackgroundApp"
*.mecHost.independentMecApp[2].mp1Address = "mecHost.virtualisationInfrastructure"
*.mecHost.independentMecApp[2].mp1Port = 10021
*.mecHost.independentMecApp[2].lambda = 15ms
*.mecHost.independentMecApp[3].typename = "MecRequestBackgroundApp"
*.mecHost.independentMecApp[3].mp1Address = "mecHost.virtualisationInfrastructure"
*.mecHost.independentMecApp[3].mp1Port = 10021
*.mecHost.independentMecApp[3].lambda = 15ms
*.car[*].app[1].period = 0.3s
*.car[*].app[1].stopTime = 75s
