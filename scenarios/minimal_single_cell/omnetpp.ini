[General]
network = scenarios.minimal_single_cell.MinimalSingleCell
sim-time-limit = 40s
seed-set = 12345
debug-on-errors = false
print-undisposed = false
**.routingRecorder.enabled = false
**.sctp.**.scalar-recording = false
**.sctp.**.vector-recording = false
**.vector-recording = true

output-scalar-file = ../../results/raw/minimal_single_cell/${configname}.sca
output-vector-file = ../../results/raw/minimal_single_cell/${configname}.vec

##########################################################
# Geometry and IP configuration
##########################################################
*.configurator.config = xmldoc("demo.xml")

**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 700m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initFromDisplayString = false

##########################################################
# Radio and carrier configuration
##########################################################
*.carrierAggregation.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].numerologyIndex = 0
*.carrierAggregation.componentCarrier[0].carrierFrequency = 3.5GHz
*.carrierAggregation.componentCarrier[0].numBands = 50

*.gnb.cellularNic.numCarriers = 1
*.gnb.cellularNic.channelModel[0].componentCarrierModule = "carrierAggregation.componentCarrier[0]"

*.ue[*].cellularNic.numCarriers = 1
*.ue[*].cellularNic.nrChannelModel[0].componentCarrierModule = "carrierAggregation.componentCarrier[0]"

**.ueTxPower = 26dBm
**.eNodeBTxPower = 43dBm
**.targetBler = 0.01
**.blerShift = 5
**.dynamicCellAssociation = false
**.enableHandover = false

##########################################################
# Topology placement
##########################################################
*.gnb.mobility.initialX = 650m
*.gnb.mobility.initialY = 320m

*.numUe = 3
*.ue[*].mobility.typename = "StationaryMobility"
*.ue[*].masterId = 0
*.ue[*].macCellId = 0
*.ue[*].nrMasterId = 1
*.ue[*].nrMacCellId = 1

*.ue[0].mobility.initialX = 520m
*.ue[0].mobility.initialY = 450m
*.ue[1].mobility.initialX = 640m
*.ue[1].mobility.initialY = 520m
*.ue[2].mobility.initialX = 780m
*.ue[2].mobility.initialY = 470m

##########################################################
# Application layer
##########################################################
*.server.numApps = 3
*.server.app[*].typename = "CbrReceiver"
*.server.app[*].localPort = 3000 + ancestorIndex(0)

*.ue[*].numApps = 1
*.ue[*].app[0].typename = "CbrSender"
*.ue[*].app[0].packetSize = ${packetSize=512B}
*.ue[*].app[0].sampling_time = ${samplingTime=0.05s}
*.ue[*].app[0].destAddress = "server"
*.ue[*].app[0].destPort = 3000 + ancestorIndex(1)
*.ue[*].app[0].localPort = 4000 + ancestorIndex(1)
*.ue[*].app[0].startTime = 0.5s + ancestorIndex(1) * 0.05s
*.ue[*].app[0].finishTime = 39.5s

[Config MinimalUlLight]
description = "Deterministic light-load uplink baseline with three NR UEs"
*.ue[*].app[0].packetSize = 512B
*.ue[*].app[0].sampling_time = 0.05s

[Config MinimalUlHeavy]
description = "Heavier offered-load preset for quick stress comparison"
*.ue[*].app[0].packetSize = 1200B
*.ue[*].app[0].sampling_time = 0.01s

